<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altate Global Auction Lobby Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .gold-gradient-text {
            background: linear-gradient(to bottom, #fef08a, #d4af37, #a16207);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 1.5rem;
        }
        .glow-gold { box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        .active-tab {
            background: rgba(212, 175, 55, 0.2);
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .asset-card img { filter: grayscale(100%); transition: 0.5s; }
        .asset-card:hover img { filter: grayscale(0%); transform: scale(1.1); }
    </style>
</head>
<body class="p-8 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <div class="flex justify-between items-end border-b border-yellow-500/20 pb-4">
            <div>
                <p class="text-[10px] text-yellow-500/60 uppercase tracking-[0.3em]">Altate Global Auction House</p>
                <h1 class="text-4xl font-black gold-gradient-text italic tracking-tighter">帝國拍賣行</h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-yellow-500/60 uppercase tracking-widest font-bold">今日國庫累積規費 (15%)</p>
                <p class="text-2xl font-black font-mono gold-gradient-text">$1,245,800</p>
            </div>
        </div>

        <!-- Category Nav -->
        <div class="flex flex-wrap gap-3">
            <button onclick="filterItems('ALL')" class="nav-btn active-tab px-6 py-2.5 rounded-full border-2 border-white/10 bg-white/5 text-xs font-black uppercase tracking-widest transition-all">全部資產</button>
            <button onclick="filterItems('ARTIST')" class="nav-btn px-6 py-2.5 rounded-full border-2 border-white/10 bg-white/5 text-xs font-black uppercase tracking-widest transition-all">畫家創作</button>
            <button onclick="filterItems('CEO')" class="nav-btn px-6 py-2.5 rounded-full border-2 border-white/10 bg-white/5 text-xs font-black uppercase tracking-widest transition-all">官方特許</button>
            <button onclick="filterItems('AI')" class="nav-btn px-6 py-2.5 rounded-full border-2 border-white/10 bg-white/5 text-xs font-black uppercase tracking-widest transition-all">AI 管家</button>
        </div>

        <!-- Asset Grid -->
        <div id="asset-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Items will be injected here -->
        </div>
    </div>

    <script>
        const items = [
            { id: 1, name: "皇帝卡 (Emperor) #001", type: "ARTIST", price: 500, img: "https://picsum.photos/seed/emperor/400/600", tag: "畫家作品" },
            { id: 2, name: "帝國鎬子 (Pickaxe) - 傳奇", type: "CEO", price: 1200, img: "https://picsum.photos/seed/pickaxe/400/600", tag: "官方授權" },
            { id: 3, name: "平民卡 (Citizen) #042", type: "ARTIST", price: 150, img: "https://picsum.photos/seed/citizen/400/600", tag: "畫家作品" },
            { id: 4, name: "AI 管家：萊娜 (Lyna)", type: "AI", price: 2500, img: "https://picsum.photos/seed/lyna/400/600", tag: "官方授權" },
            { id: 5, name: "奴隸卡 (Slave) #999", type: "ARTIST", price: 50, img: "https://picsum.photos/seed/slave/400/600", tag: "畫家作品" },
            { id: 6, name: "AI 管家：萊恩 (Ryan)", type: "AI", price: 2200, img: "https://picsum.photos/seed/ryan/400/600", tag: "官方授權" }
        ];

        function renderItems(filtered) {
            const grid = document.getElementById('asset-grid');
            grid.innerHTML = filtered.map(item => `
                <div class="asset-card glass-card overflow-hidden cursor-pointer group transition-all hover:-translate-y-2">
                    <div class="relative aspect-[3/4] overflow-hidden">
                        <img src="${item.img}" class="w-full h-full object-cover">
                        <div class="absolute top-3 right-3 px-2 py-1 bg-black/60 border border-white/10 rounded text-[8px] font-black text-yellow-500 uppercase">誠信分 80+ 准入</div>
                        <div class="absolute bottom-3 left-3 text-[10px] font-bold text-white/60 uppercase">${item.tag}</div>
                    </div>
                    <div class="p-5 space-y-3">
                        <h3 class="font-black text-white group-hover:text-yellow-500 transition-colors">${item.name}</h3>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase font-bold">當前出價</p>
                                <p class="text-lg font-black font-mono text-yellow-500">$${item.price.toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-500 uppercase font-bold">剩餘時間</p>
                                <p class="text-xs font-black font-mono text-white">00:30</p>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterItems(type) {
            // Update UI
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.textContent.includes(type === 'ALL' ? '全部' : type === 'ARTIST' ? '畫家' : type === 'CEO' ? '官方' : 'AI')) {
                    btn.classList.add('active-tab');
                } else {
                    btn.classList.remove('active-tab');
                }
            });

            if (type === 'ALL') {
                renderItems(items);
            } else {
                renderItems(items.filter(i => i.type === type));
            }
        }

        // Initial render
        renderItems(items);
    </script>
</body>
</html>
